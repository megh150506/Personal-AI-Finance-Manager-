<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — Finance Manager</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── Page-specific styles ── */
    .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; margin-bottom: 18px; }
    .chart-card .card-title { margin-bottom: 16px; }

    .stat-highlight {
      display: flex; gap: 16px; flex-wrap: wrap;
      padding: 14px 0; border-bottom: 1px solid var(--border); margin-bottom: 14px;
    }
    .stat-h { font-size: 0.82rem; }
    .stat-h .label { color: var(--muted); }
    .stat-h .val   { font-size: 1.1rem; font-weight: 700; }

    .trend-indicator {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.75rem; font-weight: 600; padding: 2px 8px;
      border-radius: 20px;
    }
    .trend-up   { background: var(--green-bg); color: var(--green); }
    .trend-down { background: var(--red-bg);   color: var(--red);   }

    .cat-leaderboard { display: flex; flex-direction: column; gap: 0; }
    .cat-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem;
    }
    .cat-row:last-child { border-bottom: none; }
    .cat-rank { width: 22px; color: var(--muted); font-weight: 700; font-size: 0.8rem; }
    .cat-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { flex: 1; }
    .cat-bar-wrap { width: 140px; }
    .cat-mini-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .cat-mini-fill{ height: 100%; border-radius: 3px; }
    .cat-pct  { width: 40px; text-align: right; color: var(--muted); font-size: 0.8rem; }
    .cat-amt  { width: 90px; text-align: right; font-weight: 600; }

    select.period-sel {
      width: auto; padding: 6px 10px; font-size: 0.8rem;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="logo-icon">💰</span> FinanceIQ</div>
    <nav class="sidebar-nav">
      <a class="nav-link"        href="dashboard.html">    <span class="icon">🏠</span> Dashboard</a>
      <a class="nav-link"        href="transactions.html"> <span class="icon">📋</span> Transactions</a>
      <a class="nav-link"        href="budget.html">       <span class="icon">🎯</span> Budget</a>
      <a class="nav-link active" href="analytics.html">    <span class="icon">📊</span> Analytics</a>
      <a class="nav-link"        href="ai-advisor.html">   <span class="icon">🤖</span> AI Advisor</a>
    </nav>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <h1 class="page-title">Analytics</h1>
    <p class="page-sub">Deep dive into your financial trends and spending patterns.</p>

    <!-- Metrics -->
    <div class="metrics-grid" id="metrics"></div>

    <!-- Row 1: Income vs Expenses bar + Savings line -->
    <div class="two-col">
      <div class="chart-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div class="card-title" style="margin:0">Monthly income vs expenses</div>
          <select class="period-sel" id="months-sel" onchange="renderAll()">
            <option value="6">Last 6 months</option>
            <option value="12">Last 12 months</option>
            <option value="0">All time</option>
          </select>
        </div>
        <canvas id="bar-chart" height="230"></canvas>
      </div>
      <div class="chart-card">
        <div class="card-title">Savings trend</div>
        <canvas id="line-chart" height="230"></canvas>
      </div>
    </div>

    <!-- Row 2: Spending pie + Category leaderboard -->
    <div class="two-col">
      <div class="chart-card">
        <div class="card-title">Spending by category</div>
        <canvas id="pie-chart" height="230"></canvas>
      </div>
      <div class="chart-card">
        <div class="card-title">Top spending categories</div>
        <div class="cat-leaderboard" id="cat-leader"></div>
      </div>
    </div>

    <!-- Income sources -->
    <div class="chart-card">
      <div class="card-title">Income sources</div>
      <canvas id="income-bar" height="150"></canvas>
    </div>

    <!-- Monthly breakdown table -->
    <div class="chart-card">
      <div class="card-title">Monthly summary table</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:0.85rem">
          <thead>
            <tr id="summary-head" style="border-bottom:1px solid var(--border)"></tr>
          </thead>
          <tbody id="summary-body"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="data.js"></script>
<script>
seedDemoData();

const charts = {};

// ── Helper: filtered months ───────────────────────────────────
function getFilteredMonthly() {
  const n = parseInt(document.getElementById('months-sel').value);
  const monthly = getMonthlyData(getData());
  let keys = Object.keys(monthly).sort();
  if (n > 0) keys = keys.slice(-n);
  return { keys, monthly };
}

// ── Metrics ───────────────────────────────────────────────────
function renderMetrics() {
  const txs = getData();
  const { income, expense, balance } = getSummary(txs);

  // month-over-month savings change
  const monthly = getMonthlyData(txs);
  const mKeys   = Object.keys(monthly).sort();
  const last  = mKeys.length >= 1 ? monthly[mKeys[mKeys.length - 1]] : null;
  const prev  = mKeys.length >= 2 ? monthly[mKeys[mKeys.length - 2]] : null;
  const lastSave = last ? last.income - last.expense : 0;
  const prevSave = prev ? prev.income - prev.expense : 0;
  const delta    = prevSave !== 0 ? ((lastSave - prevSave) / Math.abs(prevSave) * 100).toFixed(1) : 0;

  const rate = income > 0 ? (balance / income * 100).toFixed(1) : 0;
  const avgMonthlyExp = mKeys.length ? (txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)/mKeys.length).toFixed(0) : 0;

  document.getElementById('metrics').innerHTML = `
    <div class="metric">
      <div class="metric-label">Total income</div>
      <div class="metric-value green">${fmt(income)}</div>
      <div class="metric-sub">All time</div>
    </div>
    <div class="metric">
      <div class="metric-label">Total expenses</div>
      <div class="metric-value red">${fmt(expense)}</div>
      <div class="metric-sub">All time</div>
    </div>
    <div class="metric">
      <div class="metric-label">Net savings</div>
      <div class="metric-value blue">${fmt(balance)}</div>
      <div class="metric-sub">Overall savings rate: ${rate}%</div>
    </div>
    <div class="metric">
      <div class="metric-label">Avg monthly expense</div>
      <div class="metric-value amber">${fmt(parseFloat(avgMonthlyExp))}</div>
      <div class="metric-sub">Over ${mKeys.length} months</div>
    </div>
  `;
}

// ── Bar chart: income vs expenses ────────────────────────────
function renderBar() {
  if (charts.bar) charts.bar.destroy();
  const { keys, monthly } = getFilteredMonthly();
  charts.bar = new Chart(document.getElementById('bar-chart'), {
    type: 'bar',
    data: {
      labels: keys,
      datasets: [
        { label: 'Income',   data: keys.map(k => monthly[k].income),  backgroundColor: 'rgba(29,158,117,0.75)', borderRadius: 4, borderSkipped: false },
        { label: 'Expenses', data: keys.map(k => monthly[k].expense), backgroundColor: 'rgba(226,75,74,0.75)',  borderRadius: 4, borderSkipped: false }
      ]
    },
    options: {
      plugins: { legend: { labels: { color: '#7a8099', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#7a8099', font: { size: 10 } }, grid: { color: '#2e3348' } },
        y: { ticks: { color: '#7a8099', font: { size: 11 }, callback: v => '₹' + v.toLocaleString() }, grid: { color: '#2e3348' } }
      },
      maintainAspectRatio: false
    }
  });
}

// ── Line chart: savings trend ─────────────────────────────────
function renderLine() {
  if (charts.line) charts.line.destroy();
  const { keys, monthly } = getFilteredMonthly();
  const savings = keys.map(k => monthly[k].income - monthly[k].expense);
  charts.line = new Chart(document.getElementById('line-chart'), {
    type: 'line',
    data: {
      labels: keys,
      datasets: [{
        label: 'Net savings',
        data: savings,
        borderColor: '#378add',
        backgroundColor: 'rgba(55,138,221,0.1)',
        fill: true, tension: 0.4,
        pointRadius: 5, pointBackgroundColor: '#378add',
        pointBorderColor: '#0f1117', pointBorderWidth: 2
      }]
    },
    options: {
      plugins: { legend: { labels: { color: '#7a8099', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#7a8099', font: { size: 10 } }, grid: { color: '#2e3348' } },
        y: { ticks: { color: '#7a8099', font: { size: 11 }, callback: v => '₹' + v.toLocaleString() }, grid: { color: '#2e3348' } }
      },
      maintainAspectRatio: false
    }
  });
}

// ── Pie chart: spending ───────────────────────────────────────
function renderPie() {
  if (charts.pie) charts.pie.destroy();
  const txs  = getData().filter(t => t.type === 'expense');
  const tots = {};
  txs.forEach(t => { tots[t.cat] = (tots[t.cat] || 0) + t.amount; });
  const labels = Object.keys(tots).sort((a,b) => tots[b]-tots[a]);
  const vals   = labels.map(l => tots[l]);
  if (!labels.length) return;

  charts.pie = new Chart(document.getElementById('pie-chart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: vals, backgroundColor: labels.map(l => CAT_COLORS[l] || '#888'), borderWidth: 0 }] },
    options: {
      cutout: '55%',
      plugins: { legend: { position: 'bottom', labels: { color: '#7a8099', font: { size: 11 }, boxWidth: 12, padding: 14 } } },
      maintainAspectRatio: false
    }
  });
}

// ── Category leaderboard ──────────────────────────────────────
function renderLeaderboard() {
  const txs  = getData().filter(t => t.type === 'expense');
  const tots = {};
  txs.forEach(t => { tots[t.cat] = (tots[t.cat] || 0) + t.amount; });
  const sorted = Object.entries(tots).sort((a,b) => b[1]-a[1]);
  const max    = sorted[0]?.[1] || 1;
  const total  = sorted.reduce((s,[,v]) => s+v, 0);

  document.getElementById('cat-leader').innerHTML = sorted.slice(0, 8).map(([cat, amt], i) => `
    <div class="cat-row">
      <div class="cat-rank">#${i+1}</div>
      <div class="cat-dot" style="background:${CAT_COLORS[cat]||'#888'}"></div>
      <div class="cat-name">${cat}</div>
      <div class="cat-bar-wrap">
        <div class="cat-mini-bar">
          <div class="cat-mini-fill" style="width:${(amt/max*100).toFixed(1)}%;background:${CAT_COLORS[cat]||'#888'}"></div>
        </div>
      </div>
      <div class="cat-pct">${(amt/total*100).toFixed(1)}%</div>
      <div class="cat-amt" style="color:var(--red)">${fmt(amt)}</div>
    </div>`).join('');
}

// ── Income sources bar ────────────────────────────────────────
function renderIncomeBar() {
  if (charts.income) charts.income.destroy();
  const txs  = getData().filter(t => t.type === 'income');
  const tots = {};
  txs.forEach(t => { tots[t.cat] = (tots[t.cat] || 0) + t.amount; });
  const labels = Object.keys(tots);
  const vals   = labels.map(l => tots[l]);

  charts.income = new Chart(document.getElementById('income-bar'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Income', data: vals,
        backgroundColor: 'rgba(29,158,117,0.75)', borderRadius: 6
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7a8099', font: { size: 11 }, callback: v => '₹' + v.toLocaleString() }, grid: { color: '#2e3348' } },
        y: { ticks: { color: '#e8eaf0', font: { size: 12 } }, grid: { display: false } }
      },
      maintainAspectRatio: false
    }
  });
}

// ── Monthly summary table ─────────────────────────────────────
function renderTable() {
  const monthly = getMonthlyData(getData());
  const keys    = Object.keys(monthly).sort().reverse().slice(0, 12);

  document.getElementById('summary-head').innerHTML = `
    <th style="padding:8px 12px;color:var(--muted);font-size:0.75rem;text-align:left">Month</th>
    <th style="padding:8px 12px;color:var(--muted);font-size:0.75rem;text-align:right">Income</th>
    <th style="padding:8px 12px;color:var(--muted);font-size:0.75rem;text-align:right">Expenses</th>
    <th style="padding:8px 12px;color:var(--muted);font-size:0.75rem;text-align:right">Savings</th>
    <th style="padding:8px 12px;color:var(--muted);font-size:0.75rem;text-align:right">Rate</th>
  `;

  document.getElementById('summary-body').innerHTML = keys.map(k => {
    const { income, expense } = monthly[k];
    const saved = income - expense;
    const rate  = income > 0 ? (saved / income * 100).toFixed(1) : '0.0';
    return `
      <tr style="border-bottom:1px solid var(--border)">
        <td style="padding:10px 12px;font-weight:600">${k}</td>
        <td style="padding:10px 12px;text-align:right;color:var(--green)">${fmt(income)}</td>
        <td style="padding:10px 12px;text-align:right;color:var(--red)">${fmt(expense)}</td>
        <td style="padding:10px 12px;text-align:right;color:${saved>=0?'var(--blue)':'var(--red)'}">${fmt(saved)}</td>
        <td style="padding:10px 12px;text-align:right">
          <span class="badge ${parseFloat(rate)>=20?'green':parseFloat(rate)>=10?'amber':'red'}">${rate}%</span>
        </td>
      </tr>`;
  }).join('');
}

// ── Render all ────────────────────────────────────────────────
function renderAll() {
  renderMetrics();
  renderBar();
  renderLine();
  renderPie();
  renderLeaderboard();
  renderIncomeBar();
  renderTable();
}

renderAll();
</script>
</body>
</html>
